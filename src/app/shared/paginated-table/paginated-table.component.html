@if (loading) {
  <app-loading-spinner [loading]="true" />
} @else if (dataSource.data.length === 0) {
  <div class="empty-state">{{ emptyMessage }}</div>
} @else {
  <div class="table-wrapper">
    <table mat-table matSort [dataSource]="dataSource" (matSortChange)="sortChange.emit($event)">
      @for (col of columns; track col.key) {
        <ng-container [matColumnDef]="col.key">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>{{ col.header }}</th>
          <td mat-cell *matCellDef="let row">{{ row[col.key] }}</td>
        </ng-container>
      }

      <tr mat-header-row *matHeaderRowDef="displayedColumns()"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns()"></tr>
    </table>

    <mat-paginator
      [length]="total"
      [pageIndex]="page - 1"
      [pageSize]="pageSize"
      [pageSizeOptions]="pageSizeOptions"
      (page)="pageChange.emit($event)"
      showFirstLastButtons
    >
    </mat-paginator>
  </div>
}
